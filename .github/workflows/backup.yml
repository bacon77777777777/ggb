name: Daily Database Backup

on:
  schedule:
    # 每天凌晨 3:00 UTC+8（即 UTC 19:00）
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Dump database
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          FILENAME="ggb-backup-$(date +%Y%m%d-%H%M%S).sql.gz"
          pg_dump \
            --host=${{ secrets.SUPABASE_DB_HOST }} \
            --port=5432 \
            --username=postgres \
            --dbname=postgres \
            --no-password \
            --schema=public \
            | gzip > "$FILENAME"
          echo "BACKUP_FILE=$FILENAME" >> $GITHUB_ENV
          echo "Backup size: $(du -sh $FILENAME | cut -f1)"

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90

      - name: Notify on failure
        if: failure()
        run: echo "::error::Database backup failed! Check logs immediately."
