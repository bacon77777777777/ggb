name: Deploy via Vercel Hooks

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy (production|staging)"
        required: false
        default: "production"

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Select Hook (Frontend)
        id: select
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "hook=${{ secrets.VERCEL_DEPLOY_HOOK_FRONTEND_PROD }}" >> $GITHUB_OUTPUT
            echo "env=production" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            echo "hook=${{ secrets.VERCEL_DEPLOY_HOOK_FRONTEND_STAGING }}" >> $GITHUB_OUTPUT
            echo "env=staging" >> $GITHUB_OUTPUT
          else
            echo "hook=" >> $GITHUB_OUTPUT
            echo "env=unknown" >> $GITHUB_OUTPUT
          fi
      - name: Deploy Frontend
        if: steps.select.outputs.hook != ''
        run: |
          curl -X POST "${{ steps.select.outputs.hook }}"
      - name: Skip (no hook configured)
        if: steps.select.outputs.hook == ''
        run: echo "No frontend deploy hook configured for branch ${{ github.ref_name }}. Skipping."

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Select Hook (Backend)
        id: select
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "hook=${{ secrets.VERCEL_DEPLOY_HOOK_BACKEND_PROD }}" >> $GITHUB_OUTPUT
            echo "env=production" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            echo "hook=${{ secrets.VERCEL_DEPLOY_HOOK_BACKEND_STAGING }}" >> $GITHUB_OUTPUT
            echo "env=staging" >> $GITHUB_OUTPUT
          else
            echo "hook=" >> $GITHUB_OUTPUT
            echo "env=unknown" >> $GITHUB_OUTPUT
          fi
      - name: Deploy Backend
        if: steps.select.outputs.hook != ''
        run: |
          curl -X POST "${{ steps.select.outputs.hook }}"
      - name: Skip (no hook configured)
        if: steps.select.outputs.hook == ''
        run: echo "No backend deploy hook configured for branch ${{ github.ref_name }}. Skipping."

